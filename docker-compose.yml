# Local development — backend + frontend + PostgreSQL
# Usage: docker compose up --build
# Training (GPU): docker compose -f docker-compose.yml -f docker-compose.training.yml --profile training up model_trainer

name: tomato-disease

services:
  postgres:
    image: postgres:16-alpine
    container_name: tomato-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tomato}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tomato}
      POSTGRES_DB: ${POSTGRES_DB:-tomato_disease}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-tomato} -d ${POSTGRES_DB:-tomato_disease}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - tomato-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tomato-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - model_artifacts:/app/model_artifacts:ro
      - prediction_uploads:/app/uploads
    env_file:
      - .env
    environment:
      MODEL_PATH: ${MODEL_PATH:-/app/model/best_model.onnx}
      LABELS_PATH: ${LABELS_PATH:-/app/model/class_labels.json}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tomato}:${POSTGRES_PASSWORD:-tomato}@postgres:5432/${POSTGRES_DB:-tomato_disease}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - tomato-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tomato-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tomato-net

  model_trainer:
    build:
      context: ./resnet34_model
      dockerfile: Dockerfile
    container_name: tomato-model-trainer
    profiles:
      - training
    volumes:
      - ./resnet34_model:/app
      - model_artifacts:/app/outputs
    working_dir: /app
    env_file:
      - .env
    networks:
      - tomato-net

volumes:
  model_artifacts:
  prediction_uploads:
  frontend_node_modules:
  postgres_data:

networks:
  tomato-net:
    driver: bridge
